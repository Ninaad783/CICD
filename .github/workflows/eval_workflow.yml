name: LLM Evaluation CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'dashboard/data/run_history.json'
      - 'README.md'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run LLM Evaluation
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_COMMIT_MSG: ${{ github.event.head_commit.message }}
        GITHUB_ACTOR: ${{ github.actor }}
      run: |
        # Create kb directory and check if any text files exist, otherwise create default sample
        python rag_pipeline.py 
        # Execute evaluation script. It will exit with 1 if SLAs/thresholds fail.
        python eval_pipeline.py

    - name: Commit updated run history
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add dashboard/data/run_history.json
        git commit -m "chore: update evaluation run history [skip ci]" || echo "No changes to commit"
        git push origin main

    - name: Deploy to GitHub Pages
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dashboard
